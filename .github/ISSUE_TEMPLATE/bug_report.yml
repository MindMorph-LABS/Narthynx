name: Bug report
description: Report a reproducible Narthynx defect
title: "[Bug]: "
labels:
  - bug
body:
  - type: checkboxes
    id: safety
    attributes:
      label: Safety confirmation
      description: Do not file public issues containing secrets, credentials, private keys, or exploit details. Use SECURITY.md instead.
      options:
        - label: This is not a safety, credential, or vulnerability report.
          required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Which command, workspace file, mission state, or runtime behavior is affected?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `pnpm narthynx init`
        2. Run `pnpm narthynx mission "..."`
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include command output only if it contains no secrets.
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "20.x"
  - type: input
    id: pnpm
    attributes:
      label: pnpm version
      placeholder: "10.x"
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS, Linux, Windows"
  - type: input
    id: version
    attributes:
      label: Narthynx version or commit
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add mission IDs, ledger event types, or file paths only when safe to share.
